<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Explorer</title>

  <!-- Linkki CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- otsikko -->
    <h1>🎬 Movie Explorer</h1>

    <!-- kuvausteksti -->
    <p class="subtitle">Popular movies & search</p>

    <!-- Hakukenttä ja nappi -->
    <div class="search-box">
      <input type="text" id="search" placeholder="Search movie...">
      <button id="btn">Search</button>
    </div>

    <!-- renderöi elokuvat js -->
    <div id="results"></div>

  </div>

  <!-- Js teidosto -->
  <script src="script.js"></script>
</body>
</html>
</html>
