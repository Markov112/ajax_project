<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Explorer</title>

  // css tyylit
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    // otsikko
    <h1>🎬 Movie Explorer</h1>

    // kuvaus
    <p class="subtitle">Popular movies & search</p>

    // hakukenttä ja nappi
    <div class="search-box">
      <input type="text" id="search" placeholder="Search movie...">
      <button id="btn">Search</button>
    </div>

    // rendaa leffat js
    <div id="results"></div>

  </div>

  // js teidosto
  <script src="script.js"></script>
</body>
</html>
